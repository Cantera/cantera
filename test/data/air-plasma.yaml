description: |-
  A compilation of atomic and molecular cross-section data assembled by A. V. Phelps in
  the 1970s and 1980s for gases such as O₂, N₂, He, Ar, etc. The compilation itself
  is unpublished; data used from it are cited as: A. V. Phelps, private communication
  (compilation of electron cross-sections), retrieved [8/1/25], from Phelps collection.
  (see http://www.lxcat.net/contributors/#d19).

  This dataset is provided in a Cantera-compatible format only for demonstration
  purposes. Any scientific use of this dataset should note the recommended citation
  approach for data obtained from the LXCat project as described at
  https://nl.lxcat.net/instructions/how_reference.php.


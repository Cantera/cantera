docstring: |-
  Generated CLib API for Cantera's ReactorNet class.
prefix: reactornet
base: ReactorNet
recipes:
- name: new
  wraps: newReactorNet
- name: setInitialTime
- name: setMaxTimeStep
- name: setRelativeTolerance
- name: setAbsoluteTolerance
- name: clearAbsoluteTolerance
- name: setTolerances  # deprecated in Cantera 4.0
- name: setSensitivityTolerances
- name: advance
  wraps: advance(double)
- name: step
- name: time
- name: rtol
- name: atol
- name: sensitivity
  wraps: sensitivity(const string&, size_t, int)
- name: neq  # number of state variables / network components
- name: getState  # current state vector, length neq()
- name: componentName  # name of state-vector component i
  uses: neq
# service functions
- name: del
- name: cabinetSize

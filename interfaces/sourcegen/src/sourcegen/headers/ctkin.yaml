- name: getNetProductionRates_ddX
  brief: Dense composition Jacobian d(net production rate)/dX, column-major (n x n).
  what: method
  declaration: int32_t kin_getNetProductionRates_ddX(int32_t handle, int32_t bufLen, double* buf);
  parameters:
    handle: Handle to queried Kinetics object.
    bufLen: Length of the reserved array; must be at least nTotalSpecies squared.
    buf: Output buffer, filled column-major with the dense Jacobian.
  code: |-
    auto& obj = KineticsCabinet::at(handle);
    auto mat = obj->netProductionRates_ddX();
    int32_t rows = static_cast<int32_t>(mat.rows());
    int32_t cols = static_cast<int32_t>(mat.cols());
    int32_t need = rows * cols;
    if (bufLen < need) {
        throw CanteraError("kin_getNetProductionRates_ddX", "bufLen is too small");
    }
    for (int32_t idx = 0; idx < need; ++idx) {
        buf[idx] = 0.0;
    }
    for (int k = 0; k < mat.outerSize(); ++k) {
        for (Eigen::SparseMatrix<double>::InnerIterator it(mat, k); it; ++it) {
            buf[it.col() * rows + it.row()] = it.value();
        }
    }
    return 0;
- name: getNetRatesOfProgress_ddX
  brief: Dense reaction composition Jacobian d(net rate of progress)/dX, column-major.
  what: method
  declaration: int32_t kin_getNetRatesOfProgress_ddX(int32_t handle, int32_t bufLen, double* buf);
  parameters:
    handle: Handle to queried Kinetics object.
    bufLen: Length of the reserved array; must be at least nReactions times nTotalSpecies.
    buf: Output buffer, filled column-major with the dense Jacobian.
  code: |-
    auto& obj = KineticsCabinet::at(handle);
    auto mat = obj->netRatesOfProgress_ddX();
    int32_t rows = static_cast<int32_t>(mat.rows());
    int32_t cols = static_cast<int32_t>(mat.cols());
    int32_t need = rows * cols;
    if (bufLen < need) {
        throw CanteraError("kin_getNetRatesOfProgress_ddX", "bufLen is too small");
    }
    for (int32_t idx = 0; idx < need; ++idx) {
        buf[idx] = 0.0;
    }
    for (int k = 0; k < mat.outerSize(); ++k) {
        for (Eigen::SparseMatrix<double>::InnerIterator it(mat, k); it; ++it) {
            buf[it.col() * rows + it.row()] = it.value();
        }
    }
    return 0;
